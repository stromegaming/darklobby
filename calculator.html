<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFTWARE HUB | DARK LOBBY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #FF0000;
            --bg: #050505;
            --card: #111111;
            --text: #ffffff;
            --dim: #888888;
            --neon-green: #39ff14;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px 5%;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header-container { display: flex; align-items: center; gap: 30px; max-width: 800px; margin: 0 auto 50px auto; padding-top: 20px; }
        .logo-box-small { position: relative; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .logo-box-small img { width: 50px; z-index: 2; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5)); }
        .logo-box-small::before { content: ''; position: absolute; width: 70px; height: 70px; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); animation: rotateRect 6s linear infinite; z-index: 1; }
        @keyframes rotateRect { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header-text { text-align: left; }
        .header-text h1 { font-family: 'Orbitron'; font-size: 1.8rem; letter-spacing: 3px; margin: 0; text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }

        .system-hud { display: flex; gap: 20px; font-size: 0.75rem; margin-top: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .status-online { color: var(--neon-green); display: flex; align-items: center; gap: 5px; }
        .status-online::before { content: ''; width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); animation: blinkHUD 1s infinite; }
        @keyframes blinkHUD { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .hud-latency { color: var(--primary); }
        .hud-time { color: var(--dim); }

        /* --- Software List --- */
        .software-list { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .app-item { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 25px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .app-item:hover { border-color: var(--primary); background: #1a0505; transform: translateY(-3px); }
        .app-info { display: flex; align-items: center; gap: 20px; }
        .app-icon { width: 50px; height: 50px; background: rgba(255, 0, 0, 0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem; border: 1px solid rgba(255, 0, 0, 0.2); }
        .app-details h3 { font-family: 'Orbitron'; font-size: 1rem; margin: 0; }
        .app-details span { font-size: 0.75rem; color: var(--dim); }

        .dl-trigger { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .dl-trigger:hover { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }

        /* --- Modal Styling --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: #111; border: 2px solid var(--primary); padding: 30px; border-radius: 15px; max-width: 450px; width: 90%; text-align: center; position: relative; box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); }
        .modal-content i.security-icon { font-size: 3rem; color: #00ff00; margin-bottom: 20px; display: block; text-shadow: 0 0 15px #00ff00; }
        .modal-content h2 { font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 15px; color: #fff; }
        .modal-content p { color: #ccc; line-height: 1.6; font-size: 0.95rem; margin-bottom: 25px; font-family: 'JetBrains Mono'; }
        
        .password-box { background: rgba(255, 255, 255, 0.05); border: 1px dashed var(--primary); padding: 10px; margin: 15px 0; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; letter-spacing: 2px;}
        
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn-confirm:hover { box-shadow: 0 0 15px var(--primary); }
        .btn-cancel { background: #222; color: #fff; border: 1px solid #444; padding: 10px 25px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .btn-cancel:hover { background: #333; }

        .back-nav { margin-top: 50px; text-align: center; }
        .back-nav a { color: var(--dim); text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .back-nav a:hover { color: var(--primary); }

        @media (max-width: 600px) {
            .header-container { flex-direction: column; text-align: center; gap: 15px; }
            .header-text { text-align: center; }
            .app-item { flex-direction: column; text-align: center; gap: 15px; }
            .app-info { flex-direction: column; gap: 10px; }
            .system-hud { justify-content: center; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box-small">
            <img src="images/DGLOGO.PNG" alt="DG LOGO">
        </div>
        <div class="header-text">
            <h1>SOFTWARE HUB</h1>
            <div class="system-hud">
                <span class="status-online">SYSTEM ONLINE</span>
                <span style="color:#222;">|</span>
                <span class="hud-latency">LATENCY: <span id="pingVal">0ms</span></span>
                <span style="color:#222;">|</span>
                <span class="hud-time" id="hudClock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="software-list" id="live-hub-container">
        <p style="text-align:center; color:#555; font-family:'JetBrains Mono'; font-size:12px; margin-top:20px;">
            <i class="fas fa-circle-notch fa-spin"></i> SYNCING SECURE DATA FROM COMMAND CENTER...
        </p>
    </div>

    <div class="modal-overlay" id="downloadModal">
        <div class="modal-content">
            <i class="fas fa-shield-halved security-icon"></i>
            <h2>SAFE & VERIFIED</h2>
            <p>You are accessing a secure external link. Ensure you have the password before proceeding.</p>
            
            <p style="margin-bottom: 5px; font-size: 0.8rem; color: var(--dim);">EXTRACTION PASSWORD:</p>
            <div class="password-box">darklobby</div>

            <div class="modal-btns">
                <button id="finalDownloadBtn" class="btn-confirm">PROCEED</button>
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="back-nav">
        <a href="index.html"><i class="fas fa-arrow-left"></i> RETURN TO MAIN UNIVERSE</a>
    </div>

    <script>
        // --- HUD LOGIC: Clock & Latency ---
        function updateHUD() {
            const ping = Math.floor(Math.random() * (65 - 20 + 1)) + 20;
            document.getElementById('pingVal').innerText = ping + "ms";
            const now = new Date();
            document.getElementById('hudClock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateHUD, 1000);
        updateHUD();

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0eeboKkkcKIokuMtt9IRGq99JW7dz5_4",
            authDomain: "website-analysis-f6451.firebaseapp.com",
            databaseURL: "https://website-analysis-f6451-default-rtdb.firebaseio.com",
            projectId: "website-analysis-f6451",
            storageBucket: "website-analysis-f6451.firebasestorage.app",
            messagingSenderId: "115116599128",
            appId: "1:115116599128:web:9ea566870aa624453f272d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userPlatform = "Unknown OS";
        function getOS() {
            let userAgent = window.navigator.userAgent, platform = window.navigator.platform;
            if (/Mac/.test(platform)) return 'Mac OS';
            if (/Win/.test(platform)) return 'Windows';
            if (/iPhone|iPad|iPod/.test(userAgent)) return 'iOS';
            if (/Android/.test(userAgent)) return 'Android';
            if (/Linux/.test(platform)) return 'Linux';
            return platform || 'Unknown OS';
        }
        userPlatform = getOS();

        // --- MODAL & TRACKING LOGIC ---
        let pendingUrl = "";
        let pendingTitle = "";

        // १. जब GET LINK मा क्लिक हुन्छ, यो फङ्सन चल्छ
        window.openModal = function(url, title) {
            pendingUrl = url;
            pendingTitle = title;
            document.getElementById('downloadModal').style.display = 'flex';
        };

        // २. Modal बन्द गर्ने
        window.closeModal = function() {
            document.getElementById('downloadModal').style.display = 'none';
        };

        // ३. PROCEED थिचेपछि ट्र्याक गरेर लिङ्क खोल्ने
        document.getElementById('finalDownloadBtn').addEventListener('click', function() {
            // Firebase मा डाटा पठाउने
            db.ref('software_downloads').push({ 
                name: pendingTitle, 
                timestamp: firebase.database.ServerValue.TIMESTAMP, 
                platform: userPlatform 
            });
            db.ref('master_navigation_logs').push({ 
                main_menu: "DOWNLOADS", 
                sub_menu: pendingTitle, 
                timestamp: firebase.database.ServerValue.TIMESTAMP, 
                platform: userPlatform 
            });

            // नयाँ ट्याबमा लिङ्क खोल्ने
            window.open(pendingUrl, '_blank');
            
            // Modal बन्द गर्ने
            closeModal();
        });


        // --- FETCH LIVE UPLOADS FROM DASHBOARD ---
        db.ref('live_content/Software').on('value', snap => {
            const container = document.getElementById('live-hub-container');
            if (!container) return;
            
            container.innerHTML = ''; 
            
            if (snap.exists()) {
                const files = snap.val();
                for (let key in files) {
                    const f = files[key];
                    // यहाँ सिधै window.open नभएर openModal() कल हुन्छ
                    container.innerHTML += `
                    <div class="app-item" style="border-color: #00ff41;">
                        <div class="app-info">
                            <div class="app-icon" style="color: #00ff41; border-color: rgba(0,255,65,0.3); background: rgba(0,255,65,0.05);"><i class="fas fa-cloud-download-alt"></i></div>
                            <div class="app-details">
                                <h3 style="color:#fff;">${f.title} <span style="font-size:8px; background:#00ff41; color:#000; padding:2px 5px; border-radius:3px; vertical-align: middle;">NEW</span></h3>
                                <span>${f.desc}</span>
                            </div>
                        </div>
                        <button class="dl-trigger" style="border-color:#00ff41; color:#00ff41;" onclick="openModal('${f.url}', '${f.title}')">
                            <i class="fas fa-link"></i> GET LINK
                        </button>
                    </div>
                    `;
                }
            } else {
                container.innerHTML = `
                    <div class="app-item" style="opacity: 0.5; pointer-events: none;">
                        <div class="app-info">
                            <div class="app-icon"><i class="fas fa-clock"></i></div>
                            <div class="app-details"><h3>Coming Soon</h3><span>No software available yet...</span></div>
                        </div>
                        <button class="dl-trigger" style="border-color: #555; color: #555;"><i class="fas fa-lock"></i> LOCKED</button>
                    </div>
                `;
            }
        });
    </script>
    <script>
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('userTheme');
            if (savedTheme) { document.documentElement.style.setProperty('--primary', savedTheme); }
        }
        window.addEventListener('DOMContentLoaded', applySavedTheme);
    </script>
</body>
</html>
