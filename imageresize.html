<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image & PDF Compressor by DG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Set worker for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    
    <style>
        .logo-box { 
            position: relative; 
            width: 55px; 
            height: 55px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .logo-box img { 
            max-height: 40px; 
            z-index: 2; 
            filter: drop-shadow(0 0 8px #ef4444); 
            object-fit: contain;
        }
        .logo-box::before { 
            content: ''; 
            position: absolute; 
            width: 50px; 
            height: 50px; 
            border: 2px solid #ef4444; 
            animation: rotateRect 6s linear infinite; 
        }
        @keyframes rotateRect { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-gray-800 shadow-md border-b border-gray-700">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            
            <div class="flex items-center">
                <div class="logo-box">
                    <img src="images/DGLOGO.PNG" alt="DG Logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/150x50/111827/ef4444?text=DG';">
                </div>
            </div>
            
            <nav>
                <a href="index.html" class="flex items-center gap-2 bg-gray-700 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-md shadow transition uppercase tracking-wide text-sm">
                    <i class="fa-solid fa-house"></i> Home
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 mt-6">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-wider">
                COMPRESSOR & CONVERTER
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                Optimize and convert your Images and PDFs locally in your browser.
            </p>
        </div>

        <div id="uploadSection" class="w-full max-w-3xl bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700 relative overflow-hidden">
            <input type="file" id="uploadInput" accept="image/jpeg, image/png, image/webp, application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            
            <div id="dropZone" class="border-2 border-dashed border-gray-600 rounded-xl p-12 flex flex-col items-center justify-center bg-gray-900 transition-colors group hover:border-red-500 hover:bg-gray-800">
                <div class="bg-gray-800 p-4 rounded-full mb-4 group-hover:bg-red-600 transition shadow-lg text-red-500 group-hover:text-white">
                    <i class="fa-solid fa-file-arrow-up text-4xl"></i>
                </div>
                <h3 class="text-xl font-bold text-white mb-2 uppercase tracking-wide">Click or Drop to Upload</h3>
                <p class="text-xs text-gray-500 mt-2 uppercase">Supported: JPG, PNG, WEBP, PDF</p>
            </div>
        </div>

        <div id="compressionSettings" class="w-full max-w-3xl mt-8 bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-xl hidden">
            <h4 class="text-lg font-bold text-white mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide flex justify-between items-center">
                <span>Compression Dashboard</span>
                <button onclick="location.reload()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-cyan-400 transition">
                    <i class="fa-solid fa-rotate-right"></i> New File
                </button>
            </h4>
            
            <div class="flex flex-col md:flex-row gap-6 mb-2">
                <div class="flex-1 flex justify-center items-center bg-gray-900 rounded-lg p-2 border border-gray-700 h-64 relative overflow-hidden">
                    <img id="imagePreview" class="max-h-full max-w-full object-contain rounded" src="" alt="Preview">
                    <div id="loadingOverlay" class="absolute inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center hidden">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-cyan-400"></i>
                    </div>
                </div>

                <div class="flex-1 flex flex-col justify-center">
                    
                    <label class="block text-sm font-bold text-cyan-400 mb-2 uppercase">Output Format</label>
                    <div class="relative mb-4">
                        <select id="formatSelect" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg p-3 appearance-none focus:outline-none focus:border-red-500 transition cursor-pointer">
                            <option value="original">Keep Original Format</option>
                            <option value="image/jpeg">Convert to JPEG (.jpg)</option>
                            <option value="image/png">Convert to PNG (.png)</option>
                            <option value="image/webp">Convert to WEBP (.webp)</option>
                            <option value="application/pdf">Convert to PDF (.pdf)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <i class="fa-solid fa-chevron-down text-sm"></i>
                        </div>
                    </div>

                    <label class="block text-sm font-bold text-cyan-400 mb-2 uppercase">Quality / Scale (<span id="qualityValue">80</span>%)</label>
                    <input type="range" id="qualitySlider" min="10" max="100" value="80" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-red-600 mb-6">
                    
                    <div class="bg-gray-900 p-4 rounded-lg border border-gray-700 mb-4 font-mono text-sm">
                        <p class="text-gray-400 flex justify-between">Original Size: <span id="originalSize" class="text-white">0 KB</span></p>
                        <p class="text-gray-400 flex justify-between mt-2">New Size: <span id="compressedSize" class="text-cyan-400 font-bold">0 KB</span></p>
                    </div>
                    
                    <a id="downloadBtn" href="#" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-3 rounded shadow transition text-center w-full block uppercase tracking-wider">
                        <i class="fa-solid fa-download mr-2"></i> Download File
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center mt-12">
        <p class="text-gray-500 font-mono text-sm">&copy; 2026 DIPESH GHIMIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const uploadInput = document.getElementById('uploadInput');
        const compressionSettings = document.getElementById('compressionSettings');
        const imagePreview = document.getElementById('imagePreview');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const originalSizeTxt = document.getElementById('originalSize');
        const compressedSizeTxt = document.getElementById('compressedSize');
        const downloadBtn = document.getElementById('downloadBtn');
        const formatSelect = document.getElementById('formatSelect');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let originalImage = new Image();
        let originalFile = null;
        let isPdfInput = false;

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        uploadInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            originalFile = file;
            originalSizeTxt.textContent = formatBytes(file.size);
            compressionSettings.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
            
            isPdfInput = file.type === 'application/pdf';

            if (isPdfInput) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const typedarray = new Uint8Array(e.target.result);
                    try {
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({scale: 2.0});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        
                        await page.render({canvasContext: ctx, viewport: viewport}).promise;
                        
                        originalImage.src = canvas.toDataURL('image/jpeg');
                        originalImage.onload = () => {
                            loadingOverlay.classList.add('hidden');
                            compressImage();
                        };
                    } catch (err) {
                        alert("Error reading PDF file.");
                        loadingOverlay.classList.add('hidden');
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImage.src = e.target.result;
                    originalImage.onload = function() {
                        loadingOverlay.classList.add('hidden');
                        compressImage(); 
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        qualitySlider.addEventListener('input', function() {
            qualityValue.textContent = this.value;
            compressImage();
        });

        formatSelect.addEventListener('change', function() {
            compressImage();
        });

        function compressImage() {
            if(!originalImage.src) return;

            const quality = qualitySlider.value / 100;
            
            let mimeType = isPdfInput ? 'image/jpeg' : originalFile.type; 
            if (formatSelect.value !== 'original' && formatSelect.value !== 'application/pdf') {
                mimeType = formatSelect.value;
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // PNG Fix: PNG doesn't support 'quality' reduction natively.
            // We scale down the physical resolution mathematically to reduce file size.
            let renderWidth = originalImage.width;
            let renderHeight = originalImage.height;
            
            if (mimeType === 'image/png' && quality < 1) {
                // Using Math.sqrt so the size reduction correlates linearly with the slider
                const scale = Math.sqrt(quality);
                renderWidth = originalImage.width * scale;
                renderHeight = originalImage.height * scale;
            }

            canvas.width = renderWidth;
            canvas.height = renderHeight;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

            if (formatSelect.value === 'application/pdf') {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                
                const imgData = canvas.toDataURL('image/jpeg', quality);
                pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                
                const pdfBlob = pdf.output('blob');
                const pdfUrl = URL.createObjectURL(pdfBlob);
                
                imagePreview.src = imgData; 
                downloadBtn.href = pdfUrl;
                
                compressedSizeTxt.textContent = formatBytes(pdfBlob.size);
                downloadBtn.download = `dg_converted_${originalFile.name.split('.')[0]}.pdf`;
            } else {
                const compressedDataUrl = canvas.toDataURL(mimeType, quality);
                
                imagePreview.src = compressedDataUrl;
                downloadBtn.href = compressedDataUrl;
                
                const base64str = compressedDataUrl.split('base64,')[1];
                const decoded = atob(base64str);
                compressedSizeTxt.textContent = formatBytes(decoded.length);

                let fileExt = mimeType.split('/')[1];
                if (fileExt === 'jpeg') fileExt = 'jpg';
                
                downloadBtn.download = `dg_compressed_${originalFile.name.split('.')[0]}.${fileExt}`;
            }
        }
    </script>
</body>
</html>
