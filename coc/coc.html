<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @font-face { font-family: 'ClashFont'; src: url('Supercell-Magic.ttf') format('truetype'); }
        body { background-color: #1a1e24; background-image: url('SECONDBACKGROUND.png'); background-size: cover; background-position: center; background-attachment: fixed; color: #ffffff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .main-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .top-banner { width: 100%; background-image: url('coc-background.png'); background-size: cover; background-position: center; border-bottom: 4px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .banner-content { max-width: 750px; margin: 0 auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .sub-title { font-family: 'ClashFont', cursive; color: #fccb00; font-size: 24px; text-shadow: 2px 2px 4px #000; margin-bottom: 20px; text-transform: uppercase; }
        .stone-panel { background-image: linear-gradient(to bottom, #2b323c, #1f242b); border: 3px solid #5a6470; border-radius: 10px; padding: 20px; }
        .search-container { display: flex; gap: 10px; width: 100%; }
        .input-group { display: flex; flex: 1; background: rgba(255, 255, 255, 0.95); border-radius: 6px; border: 2px solid #fccb00; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 0 5px rgba(252, 203, 0, 0.2); overflow: hidden; }
        .input-icon { width: 45px; display: flex; align-items: center; justify-content: center; border-right: 2px solid #fccb00; }
        .player-bg { background: #1e88e5; } .clan-bg { background: #d32f2f; }
        .input-icon img { width: 32px; height: 32px; object-fit: contain; }
        .input-group input { flex: 1; border: none; padding: 12px; font-size: 14px; font-family: 'ClashFont', cursive; outline: none; color: #222; text-transform: uppercase; letter-spacing: 0.5px; }
        .search-btn { background: linear-gradient(to bottom, #e53935, #b71c1c); color: white; border: 2px solid #4a0000; border-radius: 8px; padding: 0 25px; font-family: 'ClashFont', cursive; cursor: pointer; text-shadow: 1px 1px 2px black; box-shadow: 0 4px 0 #4a0000; }
        .panel { background-color: rgba(0, 0, 0, 0.5); border: 2px solid #8b6b23; border-radius: 5px; margin-top: 20px; display: none; overflow: hidden; }
        .panel-header-custom { background: linear-gradient(to bottom, #4a3e20, #2c2411); color: #fce879; font-family: 'ClashFont', cursive; padding: 10px 15px; border-bottom: 2px solid #fccb00; font-size: 18px; text-transform: uppercase; }
        .summary-box { display: flex; gap: 25px; padding: 20px; align-items: center; background: rgba(0,0,0,0.3); }
        .badge-frame { width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; position: relative; }
        .info-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 15px; }
        .name-title-match { grid-column: span 2; font-size: 36px; font-family: 'ClashFont', cursive; color: white; text-shadow: 3px 3px 0 #000; margin-bottom: 5px; }
        .info-item { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        .info-item strong { color: #fccb00; }
        .data-section { padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        .data-title { font-family: 'ClashFont', cursive; color: #fce879; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .data-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 2px solid #444; text-align: center; position: relative; }
        .data-card img { width: 75px; height: 75px; object-fit: contain; }
        .item-name-top { font-family: 'ClashFont', cursive; font-size: 9px; color: #eee; margin-bottom: 5px; }
        .lvl-badge { position: absolute; bottom: 2px; left: 2px; background: rgba(0, 0, 0, 0.85); color: white; padding: 1px 6px; border-radius: 3px; font-family: 'ClashFont', cursive; font-size: 10px; border: 1px solid #fccb00; }
        .lvl-max-fire { box-shadow: 0 0 8px #ff9800, inset 0 0 4px #ff5722; }
        .th-badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; color: white; text-shadow: 1px 1px 1px black; }
        .th-gold { background: linear-gradient(45deg, #fbc02d, #f9a825); } 
        .th-purple { background: linear-gradient(45deg, #9c27b0, #673ab7); } 
        .th-blue { background: linear-gradient(45deg, #1e88e5, #1565c0); } 
        .th-green { background: linear-gradient(45deg, #4caf50, #2e7d32); } 
        .copy-icon-btn { background: none; border: none; cursor: pointer; display: inline-flex; align-items: center; padding: 4px; vertical-align: middle; }
        .copy-svg { width: 20px; height: 20px; fill: #fccb00; }
        #errorOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .error-box { background: #2c323c; border: 4px solid #fccb00; border-radius: 12px; padding: 30px; text-align: center; min-width: 300px; }
        .error-msg { font-family: 'ClashFont', cursive; color: #ffffff; font-size: 18px; margin-bottom: 20px; }
        .error-close { background: #fccb00; color: #000; border: none; padding: 10px 25px; border-radius: 6px; font-family: 'ClashFont', cursive; cursor: pointer; font-weight: bold; }
        .season-history-row { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px; padding-top: 15px; }
        .season-tag { font-family: 'ClashFont', cursive; font-size: 10px; color: #fccb00; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); font-size: 14px; margin-top: 10px; }
        th { background: rgba(62, 74, 89, 0.8); color: #fce879; padding: 12px; text-align: left; font-family: 'ClashFont', cursive; font-size: 10px; cursor: pointer; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="errorOverlay">
        <div class="error-box">
            <div class="error-msg" id="errorMsg">WRONG TAG!</div>
            <button class="error-close" id="errorBtn" onclick="closeError()">OK</button>
        </div>
    </div>

    <div class="top-banner">
        <div class="banner-content">
            <img src="coc-logo.png" style="max-width: 250px;" onerror="this.style.display='none'">
            <p class="sub-title">Intel Dashboard</p>
            <div class="search-container stone-panel">
                <div class="input-group">
                    <div class="input-icon player-bg"><img src="playerprofile.png" id="pSearchIcon"></div>
                    <input type="text" id="pInput" placeholder="PLAYER TAG" oninput="document.getElementById('cInput').value = ''">
                </div>
                <div class="input-group">
                    <div class="input-icon clan-bg"><img src="clanbatch.png" id="cSearchIcon"></div>
                    <input type="text" id="cInput" placeholder="CLAN TAG" oninput="document.getElementById('pInput').value = ''">
                </div>
                <button class="search-btn" onclick="fetchData()">SEARCH</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="panel" id="playerPanel">
            <div class="panel-header-custom">Player Profile</div>
            <div id="playerSummary"></div>
            <div id="heroesSection" class="data-section" style="display:none;"><div class="data-title" id="heroesHeader"><img src="HEROES/HEROESICON.png" style="width:22px; height:22px; margin-right:8px;" onerror="this.style.display='none'"><span>Heroes</span></div><div id="heroesList" class="data-grid"></div></div>
            <div id="superTroopsSection" class="data-section" style="display:none;"><div class="data-title" id="superTroopsHeader"><img src="supertroops/supericon.png" style="width:22px; height:22px; margin-right:8px;" onerror="this.style.display='none'"><span>Super Troops</span></div><div id="superTroopsList" class="data-grid"></div></div>
            <div id="troopsSection" class="data-section" style="display:none;"><div class="data-title" id="troopsHeader"><span>Troops</span></div><div id="troopsList" class="data-grid"></div></div>
            <div id="spellsSection" class="data-section" style="display:none;"><div class="data-title" id="spellsHeader"><span>Spells</span></div><div id="spellsList" class="data-grid"></div></div>
            <div id="siegeSection" class="data-section" style="display:none;"><div class="data-title" id="siegeHeader"><span>Siege Machines</span></div><div id="siegeList" class="data-grid"></div></div>
            <div id="petsSection" class="data-section" style="display:none;"><div class="data-title" id="petsHeader"><span>Pets</span></div><div id="petsList" class="data-grid"></div></div>
        </div>
        
        <div class="panel" id="clanPanel">
            <div class="panel-header-custom">Clan Intelligence Summary</div>
            <div class="summary-box" id="clanSummary"></div>
            <div id="warLeagueSection" class="data-section" style="display:none; border-bottom: 2px solid #8b6b23;">
                <div class="data-title">🛡️ War League Intelligence</div>
                <div id="warLeagueHistoryCont"></div>
            </div>
            <div class="table-wrapper">
                <table id="memberTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">MEMBER</th>
                            <th onclick="sortTable(1)">TAG</th>
                            <th onclick="sortTable(2)">TH</th>
                            <th onclick="sortTable(3)">ROLE</th>
                            <th onclick="sortTable(4)">🏆 TROPHY</th>
                        </tr>
                    </thead>
                    <tbody id="memberList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0eeboKkkcKIokuMtt9IRGq99JW7dz5_4",
            authDomain: "website-analysis-f6451.firebaseapp.com",
            databaseURL: "https://website-analysis-f6451-default-rtdb.firebaseio.com",
            projectId: "website-analysis-f6451",
            storageBucket: "website-analysis-f6451.firebasestorage.app",
            messagingSenderId: "115116599128",
            appId: "1:115116599128:web:9ea566870aa624453f272d",
            measurementId: "G-ZFPN20TE0Q"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const API_BASE = "https://coc-backend-lmdi.onrender.com";

        function showError(msg) { document.getElementById('errorMsg').innerText = msg; document.getElementById('errorOverlay').style.display = 'flex'; }
        function closeError() { document.getElementById('errorOverlay').style.display = 'none'; }
        function getCurrentSeason() { const now = new Date(); const m = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"]; return `${m[now.getMonth()]} ${now.getFullYear()}`; }

        function getTHClass(level) {
            if (level >= 14) return 'th-gold';
            if (level >= 11) return 'th-purple';
            if (level >= 8) return 'th-blue';
            return 'th-green';
        }

        function getRoleHTML(role) {
            if (role === 'leader') return '<span class="role-icon">👑</span>Leader';
            if (role === 'coLeader') return '<span class="role-icon">🛡️</span>Co-Leader';
            if (role === 'admin') return '<span class="role-icon">⭐</span>Elder';
            return 'Member';
        }

        function smartSearch(tag, type) {
            const cleanTag = tag.replace('#', '');
            if (type === 'player') { document.getElementById('pInput').value = cleanTag; document.getElementById('cInput').value = ''; }
            else { document.getElementById('cInput').value = cleanTag; document.getElementById('pInput').value = ''; }
            fetchData();
        }

        async function fetchData() {
            const pVal = document.getElementById('pInput').value.trim().toUpperCase().replace('#', '');
            const cVal = document.getElementById('cInput').value.trim().toUpperCase().replace('#', '');
            if(pVal) await getPlayer(pVal);
            else if(cVal) await getClan(cVal);
        }

        async function getPlayer(tag) {
            try {
                const res = await fetch(`${API_BASE}/api/player/%23${tag}`);
                if (!res.ok) { showError("TAG NOT FOUND OR UNAUTHORIZED"); return; }
                const d = await res.json();
                closeError();
                document.getElementById('clanPanel').style.display = 'none';
                document.getElementById('playerPanel').style.display = 'block';

                const leagueIcon = d.league ? d.league.iconUrls.medium : 'playerprofile.png';
                document.getElementById('pSearchIcon').src = leagueIcon;

                document.getElementById('playerSummary').innerHTML = `
                    <div class="summary-box">
                        <div class="badge-frame"><img src="${leagueIcon}" style="width:110px;"></div>
                        <div class="info-grid">
                            <div class="name-title-match">${d.name}</div>
                            <div class="info-item">🏠 TH: <strong class="th-badge ${getTHClass(d.townHallLevel)}">${d.townHallLevel}</strong></div>
                            <div class="info-item">🏆 Trophy: <strong>${d.trophies}</strong></div>
                            <div class="info-item" style="grid-column:span 2; color:#fccb00;">🏷️ Tag: ${d.tag} <button class="copy-icon-btn" onclick="smartSearch('${d.tag}', 'player')"><svg class="copy-svg" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button></div>
                        </div>
                    </div>`;

                const counts = { heroes: 0, superTroops: 0, troops: 0, siege: 0, pets: 0, spells: 0 };
                const sections = ["heroes", "superTroops", "troops", "siege", "pets", "spells"];
                sections.forEach(s => { document.getElementById(s+'List').innerHTML = ''; document.getElementById(s+'Section').style.display = 'none'; });

                if(d.heroes) d.heroes.forEach(h => {
                    if(h.village === "home") {
                        counts.heroes++; document.getElementById('heroesSection').style.display = 'block';
                        const isMax = (h.level === h.maxLevel);
                        document.getElementById('heroesList').innerHTML += `<div class="data-card"><span class="item-name-top">${h.name}</span><img src="HEROES/${h.name}.png" onerror="this.src='playerprofile.png'"><span class="lvl-badge ${isMax?'lvl-max-fire':''}">${h.level}</span></div>`;
                    }
                });

                if(d.troops) d.troops.forEach(t => {
                    if(t.village === "home") {
                        let sId = "";
                        const superNames = ["Super Barbarian", "Super Archer", "Super Giant", "Sneaky Goblin", "Super Wall Breaker", "Super Wizard", "Super Dragon", "Inferno Dragon", "Super Minion", "Super Valkyrie", "Super Witch", "Ice Hound", "Super Bowler", "Super Balloon", "Super Land Miner", "Super Hog Rider", "Rocket Balloon", "Super Miner", "Super Yeti"];
                        const siegeNames = ["Wall Wrecker", "Battle Blimp", "Stone Slammer", "Siege Barracks", "Log Launcher", "Flame Flinger", "Battle Drill"];
                        const petNames = ["L.A.S.S.I", "Electro Owl", "Mighty Yak", "Unicorn", "Frosty", "Diggy", "Poison Lizard", "Phoenix", "Spirit Fox", "Angry Jelly", "Sneezy", "Greedy Raven"];
                        
                        if (superNames.includes(t.name)) sId = 'superTroops';
                        else if (petNames.includes(t.name)) sId = 'pets';
                        else if (siegeNames.includes(t.name)) sId = 'siege';
                        else sId = 'troops';

                        counts[sId]++; document.getElementById(sId+'Section').style.display = 'block';
                        const isMax = (t.level === t.maxLevel);
                        const path = (sId==='superTroops') ? 'supertroops/' : '';
                        document.getElementById(sId+'List').innerHTML += `<div class="data-card"><span class="item-name-top">${t.name}</span><img src="${path}${t.name}.png" onerror="this.src='playerprofile.png'"><span class="lvl-badge ${isMax?'lvl-max-fire':''}">${t.level}</span></div>`;
                    }
                });

                if(d.spells) d.spells.forEach(s => {
                    counts.spells++; document.getElementById('spellsSection').style.display = 'block';
                    const isMax = (s.level === s.maxLevel);
                    document.getElementById('spellsList').innerHTML += `<div class="data-card"><span class="item-name-top">${s.name}</span><img src="${s.name}.png" onerror="this.src='playerprofile.png'"><span class="lvl-badge ${isMax?'lvl-max-fire':''}">${s.level}</span></div>`;
                });

                document.querySelector('#heroesHeader span').innerText = `Heroes (${counts.heroes})`;
                document.querySelector('#superTroopsHeader span').innerText = `Super Troops (${counts.superTroops})`;
                document.querySelector('#troopsHeader span').innerText = `Troops (${counts.troops})`;
                document.querySelector('#siegeHeader span').innerText = `Siege Machines (${counts.siege})`;
                document.querySelector('#petsHeader span').innerText = `Pets (${counts.pets})`;
                document.querySelector('#spellsHeader span').innerText = `Spells (${counts.spells})`;

            } catch(e) { showError("BACKEND ERROR: Please use Live Server/Hosting"); }
        }

        async function getClan(tag) {
            try {
                const res = await fetch(`${API_BASE}/api/clan/%23${tag}`);
                if (!res.ok) { showError("CLAN NOT FOUND"); return; }
                const d = await res.json();
                closeError();
                document.getElementById('playerPanel').style.display = 'none';
                document.getElementById('clanPanel').style.display = 'block';
                document.getElementById('cSearchIcon').src = d.badgeUrls.medium;

                document.getElementById('clanSummary').innerHTML = `
                    <div class="badge-frame"><img src="${d.badgeUrls.medium}" style="width:100px;"></div>
                    <div class="info-grid">
                        <div class="name-title-match">${d.name}</div>
                        <div class="info-item">⭐ Level: <strong>${d.clanLevel}</strong></div>
                        <div class="info-item">👥 Members: <strong>${d.members}/50</strong></div>
                        <div class="info-item" style="grid-column:span 2; font-size:14px; color:#fccb00;">🏷️ Tag: ${d.tag} <button class="copy-icon-btn" onclick="smartSearch('${d.tag}', 'clan')"><svg class="copy-svg" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button></div>
                    </div>`;

                const seasonKey = getCurrentSeason();
                const cleanTag = tag.replace('#', '');
                const clanRef = db.ref(`clan_history/${cleanTag}`);
                await clanRef.child(seasonKey).update({ league: d.warLeague?d.warLeague.name:'Unranked', members: d.members });

                clanRef.on('value', (snap) => {
                    const history = snap.val();
                    const cont = document.getElementById('warLeagueHistoryCont'); cont.innerHTML = '';
                    document.getElementById('warLeagueSection').style.display = 'block';
                    if(history) Object.keys(history).reverse().forEach(k => {
                        const s = history[k];
                        cont.innerHTML += `<div class="season-history-row"><div class="season-tag">${k}</div><div class="data-grid"><div class="data-card"><span class="item-name-top">LEAGUE</span><span style="color:#fccb00;">${s.league}</span></div><div class="data-card"><span class="item-name-top">MEMBERS</span><span style="color:#fccb00;">${s.members}</span></div></div></div>`;
                    });
                });

                const list = document.getElementById('memberList'); list.innerHTML = '';
                d.memberList.forEach(m => {
                    list.innerHTML += `<tr><td><strong>${m.name}</strong></td><td><span style="font-size:11px; color:#aaa;">${m.tag}</span></td><td><span class="th-badge ${getTHClass(m.townHallLevel)}">${m.townHallLevel}</span></td><td>${getRoleHTML(m.role)}</td><td><strong style="color:#fccb00;">${m.trophies}</strong></td></tr>`;
                });
            } catch(e) { showError("BACKEND ERROR: Use Live Server"); }
        }

        function sortTable(n) {
            const table = document.getElementById("memberTable");
            let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
            switching = true; dir = "asc";
            while (switching) {
                switching = false; rows = table.rows;
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false; x = rows[i].getElementsByTagName("TD")[n]; y = rows[i + 1].getElementsByTagName("TD")[n];
                    let xVal = x.innerText.toLowerCase(); let yVal = y.innerText.toLowerCase();
                    if ([2, 4].includes(n)) { xVal = parseInt(xVal.replace(/,/g, '')) || 0; yVal = parseInt(yVal.replace(/,/g, '')) || 0; }
                    if (dir == "asc") { if (xVal > yVal) { shouldSwitch = true; break; } } else if (dir == "desc") { if (xVal < yVal) { shouldSwitch = true; break; } }
                }
                if (shouldSwitch) { rows[i].parentNode.insertBefore(rows[i + 1], rows[i]); switching = true; switchcount ++; } else { if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; } }
            }
        }
    </script>
</body>
</html>
